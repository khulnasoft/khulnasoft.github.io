name: Sync Docs from Repositories

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [sync-docs]

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Pages Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install yq (YAML parser)
        run: |
          sudo apt update && sudo apt install -y jq yq

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone and Copy Docs from Repos
        env:
          GH_PAT: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          mkdir -p repos && cd repos

          for REPO in $(yq e '.repositories[]' ../repos.yml); do
            echo "Cloning $REPO..."
            git clone --depth 1 https://x-access-token:$GH_PAT@github.com/khulnasoft/$REPO.git
            cp -r $REPO/docs ../docs/$REPO 2>/dev/null || cp $REPO/README.md ../docs/$REPO.md
            rm -rf $REPO
          done
          cd ..

      - name: Commit & Push Changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto-sync latest docs"
            git push "https://x-access-token:$GH_PAT@github.com/khulnasoft/khulnasoft.github.io.git" main
